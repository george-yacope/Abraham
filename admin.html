    function getAppData() {
      const json = localStorage.getItem('abrahamAppData');
      const stored = json ? JSON.parse(json) : {};
      return {
        general: { ...defaultData.general, ...(stored.general || {}) },
        locations: stored.locations || defaultData.locations,
        characters: stored.characters || defaultData.characters,
        ages: stored.ages || defaultData.ages
      };
    }
    
    function saveAppData(data) { localStorage.setItem('abrahamAppData', JSON.stringify(data)); }

    let appData = getAppData();

    // Image Processing Utility
    window.processImageFile = (file, callback, maxDim = 800, format = 'image/webp', quality = 0.8) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          if (width > height) {
            if (width > maxDim) { height *= maxDim / width; width = maxDim; }
          } else {
            if (height > maxDim) { width *= maxDim / height; height = maxDim; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL(format, quality));
        };
      };
    };

          key: 'characters',

            { name: 'description', label: 'الوصف', type: 'textarea' },
            { name: 'image', label: 'الرابط/رفع', type: 'text', upload: true },
            { name: 'color', label: 'اللون', type: 'text' }

        { 
          title: 'الأعمار والخط الزمني',

            { name: 'age', label: 'السن', type: 'text' },

            { name: 'description', label: 'التفاصيل', type: 'textarea' },

      // Sync General Fields
      document.getElementById('heroImage').value = appData.general.heroImage || '';
      document.getElementById('mapImage').value = appData.general.mapImage || '';
      document.getElementById('chatbotContext').value = appData.general.chatbotContext || '';
      document.getElementById('successMessage').value = appData.general.successMessage || '';
      document.getElementById('pendingMessage').value = appData.general.pendingMessage || '';
      const keyInput = document.getElementById('geminiApiKey');
      if (keyInput) keyInput.value = appData.general.geminiApiKey || '';

      configs.forEach(conf => {
        const section = document.createElement('section');
        section.className = 'bg-white p-6 rounded-[2rem] shadow-sm border border-outline/20 space-y-4';
        
        let html = `
          <div class="flex items-center justify-between border-b border-outline/10 pb-4">
            <h3 class="text-xl font-black text-primary">${conf.title}</h3>
            <div class="flex gap-2">
              ${conf.key === 'locations' ? `
                <button onclick="window.addItemFromMap()" class="bg-secondary/10 text-secondary px-4 py-2 rounded-xl hover:bg-secondary/20 flex items-center gap-2 text-sm font-bold">
                  أضف من الخريطة <i data-lucide="map" class="w-4 h-4"></i>
                </button>
              ` : ''}
              <button onclick="window.addItem('${conf.key}')" class="bg-primary/10 text-primary p-2 rounded-xl hover:bg-primary/20">
                <i data-lucide="plus" class="w-6 h-6"></i>
              </button>
            </div>
          </div>
          <div class="space-y-6">
        `;

          appData[conf.key].forEach((item, index) => {
            html += `
              <div class="group relative bg-surface-container-low p-6 rounded-2xl border border-outline/10">
                <div class="flex justify-between items-start mb-4">
                  <div class="flex items-center gap-2">
                    <span class="bg-primary text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black">${index + 1}</span>
                    <h4 class="font-bold text-on-surface">بيانات المحطة</h4>
                  </div>
                  <button onclick="window.removeItem('${conf.key}', ${index})" class="p-2 text-error hover:bg-error/10 rounded-xl transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                  </button>
                </div>
                
                ${conf.key === 'locations' ? `
                  <div class="mb-4">
                    <button onclick="window.openMapPicker(${index})" 
                            class="w-full bg-primary/10 text-primary py-3 rounded-2xl border-2 border-dashed border-primary/30 hover:bg-primary/20 hover:border-primary/50 transition-all flex items-center justify-center gap-2 font-black">
                      <i data-lucide="map-pin" class="w-5 h-5"></i>
                      تحديد الموقع على الخريطة
                    </button>
                  </div>
                ` : ''}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            conf.fields.forEach(field => {
              // Hide top and left inputs for locations as they are handled by the map picker
              if(conf.key === 'locations' && (field.name === 'top' || field.name === 'left')) return;

              const val = item[field.name] || '';
            html += `
              <div class="space-y-1">
                <label class="block text-xs font-bold text-on-surface-variant">${field.label}</label>
                ${field.type === 'textarea' 
                  ? `<textarea onchange="window.updateItem('${conf.key}', ${index}, '${field.name}', this.value)" class="w-full p-2 bg-white rounded-xl border border-outline text-sm" rows="2">${val}</textarea>`
                  : `<div class="flex gap-1">
                      <input type="${field.type}" value="${val}" onchange="window.updateItem('${conf.key}', ${index}, '${field.name}', this.value)" 
                             class="flex-1 p-2 bg-white rounded-xl border border-outline text-sm">
                      ${field.upload ? `
                        <label class="bg-primary/5 text-primary p-2 rounded-xl cursor-pointer">
                          <i data-lucide="upload" class="w-4 h-4"></i>
                          <input type="file" class="hidden" accept="image/*" onchange="window.handleImageUpload(event, '${conf.key}', ${index}, '${field.name}')" />
                        </label>
                      ` : ''}
                    </div>`
                }
              </div>
            `;
          });

          html += `</div></div>`;
        });

        html += `</div>`;
        section.innerHTML = html;
        container.appendChild(section);
      });

      createIcons({ icons: { Save, Settings, Plus, Trash2, Upload, MapPin, Download, X, MapIcon, RotateCcw } });
    }

    window.updateItem = (key, index, field, value) => { appData[key][index][field] = value; };
    window.addItem = (key) => {
      const items = {
        locations: { id: Date.now().toString(), title: "محطة جديدة", description: "", top: 50, left: 50, color: "primary" },
        characters: { id: Date.now().toString(), name: "شخصية جديدة", description: "", image: "", color: "primary" },
        ages: { id: Date.now().toString(), age: "", title: "", description: "", image: "" }
      };
      appData[key].push(items[key]); renderAdmin();
      
      // If it's a location, open map picker immediately for the last added item
      if(key === 'locations') window.openMapPicker(appData.locations.length - 1);
    };

    window.addItemFromMap = () => {
      window.addItem('locations');
    };
    window.removeItem = (key, index) => { if (confirm('مسح؟')) { appData[key].splice(index, 1); renderAdmin(); } };

    window.handleImageUpload = (event, key, index, fieldName) => {
      const file = event.target.files[0];
      if (file) window.processImageFile(file, (b64) => { appData[key][index][fieldName] = b64; renderAdmin(); });
    };

    window.uploadGlobalImage = (event, eid) => {
      const file = event.target.files[0];
      if (file) window.processImageFile(file, (b64) => { document.getElementById(eid).value = b64; appData.general[eid] = b64; }, 1600);
    };

    window.handleContextFileUpload = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const text = e.target.result;
        document.getElementById('chatbotContext').value = text;
        appData.general.chatbotContext = text;
      };
      reader.readAsText(file);
    };

    // Map Picker
    let pickerIndex = null;
    window.openMapPicker = (index) => {
      pickerIndex = index;
      document.getElementById('map-picker-img').src = appData.general.mapImage || '';
      document.getElementById('map-picker-subtitle').textContent = `تحديد موقع: ${appData.locations[index].title || ''}`;
      window.refreshPickerMarkers();
      document.getElementById('map-picker-modal').classList.remove('hidden');
    };

    window.closeMapPicker = () => { document.getElementById('map-picker-modal').classList.add('hidden'); pickerIndex = null; };
    window.handleMapClick = (e) => {
      if (pickerIndex === null) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const left = (((e.clientX - rect.left) / rect.width) * 100).toFixed(2);
      const top = (((e.clientY - rect.top) / rect.height) * 100).toFixed(2);
      
      appData.locations[pickerIndex].left = left;
      appData.locations[pickerIndex].top = top;
      
      // Update visual marker immediately
      window.refreshPickerMarkers();
      renderAdmin();
    };

    window.refreshPickerMarkers = () => {
      if (pickerIndex === null) return;
      const markers = document.getElementById('map-picker-existing-markers');
      markers.innerHTML = appData.locations.map((l, i) => `
        <div class="absolute w-8 h-8 rounded-full border-4 border-white shadow-xl -translate-x-1/2 -translate-y-1/2 flex items-center justify-center text-white font-black text-xs ${i === pickerIndex ? 'bg-primary ring-4 ring-primary/30 z-30 animate-pulse' : 'bg-surface-container-highest opacity-50'}" 
             style="top: ${l.top}%; left: ${l.left}%;">
          ${i + 1}
        </div>
      `).join('');
    };

    // Global Actions
    document.getElementById('save-btn').onclick = () => {
      appData.general.heroImage = document.getElementById('heroImage').value;
      appData.general.mapImage = document.getElementById('mapImage').value;
      appData.general.chatbotContext = document.getElementById('chatbotContext').value;
      appData.general.successMessage = document.getElementById('successMessage').value;
      appData.general.pendingMessage = document.getElementById('pendingMessage').value;
      if (document.getElementById('geminiApiKey')) appData.general.geminiApiKey = document.getElementById('geminiApiKey').value;
      saveAppData(appData); alert('تم الحفظ! ✅');
    };

    document.getElementById('reset-btn').onclick = () => { if (confirm('مسح الكل؟')) { localStorage.removeItem('abrahamAppData'); location.reload(); } };
    document.getElementById('export-btn').onclick = () => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' }));
      a.download = 'backup.json'; a.click();
    };
    document.getElementById('import-input').onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => { try { appData = JSON.parse(ev.target.result); saveAppData(appData); renderAdmin(); alert('تم! 🎉'); } catch(e) { alert('خطأ!'); } };
      reader.readAsText(file);
    };

    renderAdmin();
  </script>
</body>
</html>
